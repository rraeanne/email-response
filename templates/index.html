<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NP FAQ Reply Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .main-content {
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-copy {
            background: #f0f0f0;
            color: #333;
        }

        .btn-copy:hover {
            background: #e0e0e0;
        }

        .btn-clear {
            background: #ff6b6b;
            color: white;
        }

        .btn-clear:hover {
            background: #ee5a52;
        }

        .reply-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }

        .reply-section h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .reply-text {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            line-height: 1.6;
            color: #333;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .loading {
            text-align: center;
            color: #667eea;
            margin: 20px 0;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #c33;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #3c3;
        }

        .hidden {
            display: none;
        }

        #faqFile {
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            width: 100%;
        }

        #extractedList {
            max-height: 300px;
            overflow-y: auto;
        }

        .faq-item {
            background: white;
            padding: 10px;
            margin-bottom: 8px;
            border-left: 3px solid #667eea;
            border-radius: 4px;
        }

        .faq-item-q {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
        }

        .faq-item-a {
            color: #666;
            font-size: 0.9em;
            line-height: 1.4;
        }


        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }

            .button-group {
                flex-direction: column;
            }

            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
        <div class="container">
            <div class="main-content">
                <div class="header">
                    <h1>📧 NP FAQ Reply Generator</h1>
                    <p>Instantly find the best template response for student inquiries</p>
                    <a href="/templates" style="display: inline-block; margin-top: 15px; padding: 10px 20px; background: white; color: #667eea; text-decoration: none; border-radius: 8px; font-weight: 600; transition: transform 0.2s;">📚 View Template Library</a>
                </div>

                <div class="card">
                    <form id="faqForm">
                        <div class="form-group">
                            <label for="faqInput">Paste the FAQ/Inquiry:</label>
                            <textarea id="faqInput" placeholder="Paste the student FAQ or inquiry here..." required></textarea>
                        </div>

                        <div class="button-group">
                            <button type="submit" class="btn-generate">Generate Reply</button>
                            <button type="reset" class="btn-clear">Clear</button>
                        </div>
                    </form>

                    <!-- Upload Section -->
                    <div style="border-top: 2px solid #e0e0e0; margin: 30px 0; padding-top: 20px;">
                        <h3 style="color: #667eea; margin-bottom: 15px;">📁 Upload FAQ Template (Word Doc)</h3>
                        <div class="form-group">
                            <input type="file" id="faqFile" accept=".docx" style="display: block; margin-bottom: 10px;">
                            <button type="button" class="btn-generate" onclick="uploadFaqFile()" style="width: 100%;">Extract & Preview</button>
                        </div>
                        <div id="uploadPreview" class="hidden" style="background: #f5f5f5; padding: 15px; border-radius: 8px; margin-top: 15px;">
                            <h4 style="margin-bottom: 10px; color: #333;">Extracted FAQs:</h4>
                            <div id="extractedList"></div>
                            <div style="margin-top: 15px;">
                                <button type="button" class="btn-generate" onclick="confirmUploadFaq()" style="width: 100%;">Add All to Templates</button>
                                <button type="button" class="btn-clear" onclick="clearUploadPreview()" style="width: 100%;">Cancel</button>
                            </div>
                        </div>
                    </div>

                    <div id="loading" class="loading hidden">
                        <div class="spinner"></div>
                        <p>Finding the best template...</p>
                    </div>

                    <div id="errorMessage" class="error hidden"></div>
                    <div id="successMessage" class="success hidden"></div>

                    <div id="replyContainer" class="reply-section hidden">
                        <h2>Template Reply:</h2>
                        <div id="replyText" class="reply-text"></div>
                        <div class="button-group" style="margin-top: 15px;">
                            <button class="btn-generate" onclick="copyToClipboard()">Copy Reply</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    <script>
        const form = document.getElementById('faqForm');
        const faqInput = document.getElementById('faqInput');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const replyContainer = document.getElementById('replyContainer');
        const replyText = document.getElementById('replyText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const faq = faqInput.value.trim();
            if (!faq) {
                showError('Please enter an FAQ');
                return;
            }

            // Clear previous messages
            hideMessages();
            loading.classList.remove('hidden');
            replyContainer.classList.add('hidden');

            try {
                const response = await fetch('/api/generate-reply', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ faq })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to generate reply');
                }

                replyText.textContent = data.reply;
                replyContainer.classList.remove('hidden');
                showSuccess('Template found!');
            } catch (error) {
                showError(error.message);
            } finally {
                loading.classList.add('hidden');
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove('hidden');
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.remove('hidden');
        }

        function hideMessages() {
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');
        }

        function copyToClipboard() {
            const text = replyText.textContent;
            navigator.clipboard.writeText(text).then(() => {
                showSuccess('Reply copied to clipboard!');
            }).catch(err => {
                showError('Failed to copy');
            });
        }

        let uploadedFaqText = '';

        async function uploadFaqFile() {
            hideMessages();
            const file = document.getElementById('faqFile').files[0];

            if (!file) {
                showError('Please select a file');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/upload-faq', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Upload failed');
                }

                uploadedFaqText = data.raw_text;
                displayExtractedFaqs(data.extracted, file.filename);
                document.getElementById('uploadPreview').classList.remove('hidden');

            } catch (error) {
                showError('Upload error: ' + error.message);
            }
        }

        function displayExtractedFaqs(faqs, filename) {
            const container = document.getElementById('extractedList');
            container.innerHTML = '';

            if (faqs.length === 0) {
                container.innerHTML = '<p style="color: #999;">No FAQs extracted. Try a different document format.</p>';
                return;
            }

            let html = `<p style="color: #667eea; font-weight: 600; margin-bottom: 10px;">Found ${faqs.length} FAQ entries</p>`;

            faqs.forEach((item, idx) => {
                const qText = item.q || `FAQ ${idx + 1}`;
                const aText = (item.a || '').substring(0, 80);
                const section = item.section || 'General';

                html += `
                    <div class="faq-item" data-idx="${idx}">
                        <div style="display: flex; align-items: start; gap: 8px;">
                            <input type="checkbox" class="faq-select" checked style="margin-top: 4px;">
                            <div style="flex: 1;">
                                <div class="faq-item-q">${qText}</div>
                                <div style="font-size: 0.8em; color: #999; margin-bottom: 4px;">Section: ${section}</div>
                                <div class="faq-item-a">${aText}...</div>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            window.extractedFaqsData = faqs; // Store for later
        }

        async function confirmUploadFaq() {
            const checkboxes = document.querySelectorAll('.faq-select:checked');

            if (checkboxes.length === 0) {
                showError('Select at least one FAQ to save');
                return;
            }

            const selectedFaqs = [];
            checkboxes.forEach(checkbox => {
                const idx = checkbox.closest('.faq-item').dataset.idx;
                selectedFaqs.push(window.extractedFaqsData[idx]);
            });

            try {
                const response = await fetch('/api/upload-faq/confirm', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        faqs: selectedFaqs,
                        filename: document.getElementById('faqFile').files[0].name
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Save failed');
                }

                showSuccess(`Saved ${selectedFaqs.length} FAQs to templates!`);
                clearUploadPreview();

            } catch (error) {
                showError('Save error: ' + error.message);
            }
        }

        function clearUploadPreview() {
            document.getElementById('uploadPreview').classList.add('hidden');
            document.getElementById('faqFile').value = '';
            uploadedFaqText = '';
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded');
        });
    </script>
</body>
</html>
