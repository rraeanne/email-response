<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Library - NP FAQ Reply Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .nav-btn {
            padding: 10px 20px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
        }

        .search-container {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        .search-box {
            flex: 1;
            padding: 12px;
            border: 2px solid white;
            border-radius: 8px;
            font-size: 1em;
            background: white;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .filter-tab {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            color: #333;
            font-weight: 500;
        }

        .filter-tab:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .filter-tab.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .template-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            cursor: pointer;
        }

        .template-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .template-category {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .template-category.user-uploaded {
            background: #ff9800;
        }

        .template-text {
            color: #333;
            line-height: 1.6;
            margin-bottom: 15px;
            max-height: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
        }

        .template-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: #999;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
        }

        .template-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-copy {
            flex: 1;
            padding: 8px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn-copy:hover {
            background: #5568d3;
        }

        .btn-delete {
            padding: 8px 12px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn-delete:hover {
            background: #ff5252;
        }

        .stats {
            background: white;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #999;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state h2 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .empty-state p {
            opacity: 0.9;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-close {
            float: right;
            font-size: 28px;
            font-weight: bold;
            color: #999;
            cursor: pointer;
        }

        .modal-close:hover {
            color: #333;
        }

        .modal-body {
            margin-top: 20px;
            line-height: 1.8;
            color: #333;
        }

        @media (max-width: 768px) {
            .templates-grid {
                grid-template-columns: 1fr;
            }

            .stats {
                flex-direction: column;
                gap: 20px;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Template Library</h1>
            <p>Browse and search all available FAQ templates</p>
            <div class="nav-buttons">
                <a href="/" class="nav-btn">← Back to Generator</a>
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-item">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total Templates</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="categoryCount">0</div>
                <div class="stat-label">Categories</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="uploadedCount">0</div>
                <div class="stat-label">User Uploaded</div>
            </div>
        </div>

        <div class="search-container" id="searchContainer">
            <input type="text" class="search-box" id="searchBox" placeholder="Search templates..." />
        </div>

        <div class="filter-tabs" id="filterTabs"></div>

        <div id="templatesContainer"></div>
    </div>

    <!-- Modal for full template view -->
    <div id="templateModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="template-category" id="modalCategory"></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="template-actions" style="margin-top: 20px;">
                <button class="btn-copy" onclick="copyFullTemplate()">Copy Full Text</button>
            </div>
        </div>
    </div>

    <script>
        let allTemplates = [];
        let filteredTemplates = [];
        let selectedCategory = 'All';
        let currentFullTemplate = '';

        async function loadTemplates() {
            try {
                const response = await fetch('/api/templates');
                const data = await response.json();

                allTemplates = data.templates;
                filteredTemplates = allTemplates;

                // Update stats
                const categories = [...new Set(allTemplates.map(t => t.category))];
                const uploadedCount = allTemplates.filter(t => t.category === 'User Uploaded').length;

                document.getElementById('totalCount').textContent = allTemplates.length;
                document.getElementById('categoryCount').textContent = categories.length;
                document.getElementById('uploadedCount').textContent = uploadedCount;

                // Create filter tabs
                createFilterTabs(categories);

                // Display templates
                displayTemplates(allTemplates);

                // Add search functionality
                document.getElementById('searchBox').addEventListener('input', (e) => {
                    filterTemplates(e.target.value);
                });

            } catch (error) {
                console.error('Error loading templates:', error);
                document.getElementById('templatesContainer').innerHTML = '<div class="empty-state"><h2>Failed to load templates</h2><p>' + error.message + '</p></div>';
            }
        }

        function createFilterTabs(categories) {
            const container = document.getElementById('filterTabs');
            let html = '<button class="filter-tab active" onclick="filterByCategory(\'All\')">All</button>';

            categories.forEach(cat => {
                html += `<button class="filter-tab" onclick="filterByCategory('${cat}')"">${cat}</button>`;
            });

            container.innerHTML = html;
        }

        function filterByCategory(category) {
            selectedCategory = category;

            // Update active tab
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            // Filter templates
            if (category === 'All') {
                filteredTemplates = allTemplates;
            } else {
                filteredTemplates = allTemplates.filter(t => t.category === category);
            }

            displayTemplates(filteredTemplates);
        }

        function filterTemplates(query) {
            const searchTerm = query.toLowerCase();

            if (selectedCategory === 'All') {
                filteredTemplates = allTemplates.filter(t =>
                    t.text.toLowerCase().includes(searchTerm)
                );
            } else {
                filteredTemplates = allTemplates.filter(t =>
                    t.category === selectedCategory && t.text.toLowerCase().includes(searchTerm)
                );
            }

            displayTemplates(filteredTemplates);
        }

        function displayTemplates(templates) {
            const container = document.getElementById('templatesContainer');

            if (templates.length === 0) {
                container.innerHTML = '<div class="empty-state"><h2>No templates found</h2><p>Try adjusting your search or filters</p></div>';
                return;
            }

            let html = '<div class="templates-grid">';

            templates.forEach(template => {
                const categoryClass = template.category === 'User Uploaded' ? 'user-uploaded' : '';
                const preview = template.text.substring(0, 150);

                html += `
                    <div class="template-card">
                        <div class="template-category ${categoryClass}">${template.category}</div>
                        <div class="template-text">${preview}...</div>
                        <div class="template-meta">
                            <span>${template.text.length} characters</span>
                        </div>
                        <div class="template-actions">
                            <button class="btn-copy" onclick="viewFull('${template.text.replace(/'/g, "\\'")}', '${template.category}')">View Full</button>
                            <button class="btn-copy" onclick="copyToClipboard('${template.text.replace(/'/g, "\\'")}')">Copy</button>
                            ${template.id ? `<button class="btn-delete" onclick="deleteTemplate('${template.id}')">Delete</button>` : ''}
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        function viewFull(text, category) {
            currentFullTemplate = text;
            document.getElementById('modalCategory').textContent = category;
            document.getElementById('modalBody').textContent = text;
            document.getElementById('templateModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('templateModal').classList.remove('show');
        }

        function copyFullTemplate() {
            copyToClipboard(currentFullTemplate);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            }).catch(err => {
                alert('Failed to copy');
            });
        }

        async function deleteTemplate(templateId) {
            if (!confirm('Are you sure you want to delete this template?')) {
                return;
            }

            try {
                const response = await fetch(`/api/uploaded-faqs/${templateId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadTemplates(); // Reload
                } else {
                    alert('Failed to delete template');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('templateModal');
            if (event.target == modal) {
                modal.classList.remove('show');
            }
        }

        // Load templates on page load
        loadTemplates();
    </script>
</body>
</html>
